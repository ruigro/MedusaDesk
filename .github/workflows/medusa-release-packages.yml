name: Build MedusaDesk Release Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag to upload packages into
        required: true
        default: v0.1.0-test

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.24.5"
  MAC_RUST_VERSION: "1.81"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  MAC_APP_NAME: "Medusa Desk.app"

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
            os: macos-15-intel
            vcpkg_triplet: x64-osx
            extra_args: ""
          - arch: aarch64
            target: aarch64-apple-darwin
            os: macos-14
            vcpkg_triplet: arm64-osx
            extra_args: "--screencapturekit"

    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        shell: bash
        run: |
          brew install llvm create-dmg wget
          if ! command -v pkg-config >/dev/null 2>&1; then
            brew install pkg-config
          fi
          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
          unzip nasm-2.16.03-macosx.zip
          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
          nasm --version

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Patch Flutter
        shell: bash
        run: |
          cd "$(dirname "$(dirname "$(which flutter)")")"
          git apply "${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
          sed -i -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' packages/flutter/lib/src/scheduler/binding.dart

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.target }}
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: medusadesk-macos-${{ matrix.arch }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.vcpkg_triplet }}
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            --triplet "${{ matrix.vcpkg_triplet }}" \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: Build MedusaDesk
        shell: bash
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.vcpkg_triplet }}
          MAC_APP_NAME: ${{ env.MAC_APP_NAME }}
        run: |
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            MIN_MACOS_VERSION="12.3"
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
            sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
            sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
          fi
          ./build.py --flutter --hwcodec --unix-file-copy-paste ${{ matrix.extra_args }}

      - name: Create DMG
        shell: bash
        run: |
          APP_PATH="./flutter/build/macos/Build/Products/Release/${MAC_APP_NAME}"
          test -d "$APP_PATH"
          CREATE_DMG="$(command -v create-dmg)"
          CREATE_DMG="$(readlink -f "$CREATE_DMG")"
          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG"
          create-dmg \
            --volname "MedusaDesk Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            --icon "${MAC_APP_NAME}" 200 190 \
            --hide-extension "${MAC_APP_NAME}" \
            "MedusaDesk-macos-${{ matrix.arch }}.dmg" \
            "$APP_PATH"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedusaDesk-macos-${{ matrix.arch }}
          path: MedusaDesk-macos-${{ matrix.arch }}.dmg

      - name: Attach DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          prerelease: true
          files: MedusaDesk-macos-${{ matrix.arch }}.dmg
